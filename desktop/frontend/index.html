<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resin Desktop Shell</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 56px;
      }

      .panel {
        background: rgba(15, 23, 42, 0.78);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 20px;
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.42);
        padding: 28px;
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }

      p, li, dd {
        line-height: 1.7;
        color: #cbd5e1;
      }

      .muted {
        color: #94a3b8;
      }

      dl {
        display: grid;
        grid-template-columns: 136px 1fr;
        gap: 8px 16px;
        margin: 22px 0;
      }

      dt {
        color: #94a3b8;
      }

      dd {
        margin: 0;
        word-break: break-word;
      }

      .code,
      pre {
        font-family: Consolas, "Courier New", monospace;
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: 12px;
        padding: 14px;
      }

      pre {
        white-space: pre-wrap;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 14px;
        cursor: pointer;
        transition: transform 120ms ease, opacity 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
        transform: none;
      }

      .primary {
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }

      .secondary {
        background: rgba(148, 163, 184, 0.18);
        color: #e2e8f0;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 700;
        background: rgba(56, 189, 248, 0.16);
        color: #7dd3fc;
        margin-bottom: 18px;
      }

      .danger {
        color: #fda4af;
      }

      .hero-banner {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }

      .hero-badge-mark {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        position: relative;
        background: radial-gradient(circle at 30% 30%, rgba(125, 211, 252, 0.95), rgba(14, 165, 233, 0.14) 58%, rgba(15, 23, 42, 0.88) 100%);
        border: 1px solid rgba(125, 211, 252, 0.28);
        box-shadow: 0 16px 40px rgba(2, 132, 199, 0.24);
        overflow: hidden;
      }

      .hero-badge-mark::before,
      .hero-badge-mark::after {
        content: "";
        position: absolute;
        inset: auto;
        border-radius: 999px;
      }

      .hero-badge-mark::before {
        width: 28px;
        height: 28px;
        right: -6px;
        bottom: -6px;
        background: rgba(14, 165, 233, 0.32);
      }

      .hero-badge-mark::after {
        width: 18px;
        height: 18px;
        left: 10px;
        top: 10px;
        background: rgba(224, 242, 254, 0.72);
      }

      .hero-copy h1 {
        margin-bottom: 6px;
      }

      .hero-copy p {
        margin: 0;
      }

      .wizard-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 16px;
        margin-top: 20px;
      }

      .wizard-card {
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(15, 23, 42, 0.46);
        padding: 18px;
        min-width: 0;
      }

      .wizard-card p,
      .wizard-card li,
      .wizard-card dd,
      .wizard-card code {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .wizard-card h2 {
        margin: 0 0 10px;
        font-size: 17px;
      }

      .wizard-notes {
        margin: 0;
        padding-left: 18px;
      }

      .wizard-notes li + li {
        margin-top: 8px;
      }

      .hub-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 22px;
      }

      .hub-card {
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(15, 23, 42, 0.52);
        padding: 18px;
        min-width: 0;
      }

      .hub-card p,
      .hub-card li,
      .hub-card dd,
      .hub-card code,
      .hub-card strong,
      .hub-card span {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .hub-card h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .hub-card p + p {
        margin-top: 10px;
      }

      .hub-card ul {
        margin: 12px 0 0;
        padding-left: 18px;
      }

      .hub-card code {
        font-family: Consolas, "Courier New", monospace;
        color: #bfdbfe;
      }

      .hub-actions-column {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 18px;
      }

      .hub-actions-column button {
        width: 100%;
      }

      .hub-inline-list {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .hub-inline-item {
        padding: 12px 14px;
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.38);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      .hub-inline-item strong,
      .hub-inline-item span {
        display: block;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .hub-inline-item span {
        color: #94a3b8;
        font-size: 12px;
        margin-bottom: 4px;
      }

      .hub-copy-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      .hub-copy-actions button {
        flex: 1 1 200px;
      }

      @media (max-width: 760px) {
        main {
          padding: 28px 16px 36px;
        }

        .panel {
          padding: 20px;
        }

        dl {
          grid-template-columns: 1fr;
          gap: 6px;
        }

        .hub-grid {
          grid-template-columns: 1fr;
        }

        .hero-banner,
        .wizard-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" id="app"></section>
    </main>

    <script>
      const appRoot = document.getElementById("app");
      const startupPollIntervalMs = 400;
      const bridgeRetryIntervalMs = 250;
      let firstRunStarting = false;
      let startupPollingTimer = null;
      let startupPollingInFlight = false;
      let bridgeRetryTimer = null;

      function getBridge() {
        return (
          window.go?.main?.wailsapp?.App ??
          window.go?.wailsapp?.App ??
          window.go?.main?.App ??
          null
        );
      }

      function scheduleBridgeRefresh() {
        if (bridgeRetryTimer !== null) {
          return;
        }
        bridgeRetryTimer = window.setTimeout(async () => {
          bridgeRetryTimer = null;
          await refresh();
        }, bridgeRetryIntervalMs);
      }

      async function getViewModel() {
        const bridge = getBridge();
        if (!bridge?.ShellViewModel) {
          return null;
        }
        return bridge.ShellViewModel();
      }

      async function getDesktopAccessView() {
        const bridge = getBridge();
        if (!bridge?.DesktopAccessView) {
          return null;
        }
        return bridge.DesktopAccessView();
      }

      function renderBridgePending() {
        appRoot.innerHTML = `
          <div class="status-pill">连接中</div>
          <h1>正在连接桌面壳</h1>
          <p>桌面窗口已经打开，正在等待 Wails 绑定就绪。准备完成后会自动进入首启引导或业务界面，不需要手动刷新。</p>
          <p class="muted">如果这个状态持续很久，通常说明桌面壳启动链路有异常，需要查看 data/logs 里的日志。</p>
          <div class="actions">
            <button class="primary" disabled>正在连接…</button>
          </div>
        `;
      }

      function renderWizard(viewModel) {
        const wizard = viewModel.wizard;
        appRoot.innerHTML = `
          <div class="status-pill">首启确认</div>
          <div class="hero-banner">
            <div class="hero-badge-mark" aria-hidden="true"></div>
            <div class="hero-copy">
              <h1>准备启动 Resin Core</h1>
              <p>桌面壳会先完成最小首启确认，再启动本地 Core。桌面用户只需要确认端口和目录，无需手动管理启动参数。</p>
            </div>
          </div>
          <div class="wizard-grid">
            <section class="wizard-card">
              <h2>当前启动参数</h2>
              <dl>
                <dt>便携目录</dt>
                <dd class="code">${escapeHtml(wizard.portableRootDir)}</dd>
                <dt>监听地址</dt>
                <dd>${escapeHtml(wizard.listenAddress)}</dd>
                <dt>监听端口</dt>
                <dd>
                  <input id="wizardPortInput" type="number" min="1" max="65535" value="${escapeHtml(String(wizard.port))}" ${wizard.portEditable ? "" : "disabled"}>
                </dd>
              </dl>
            </section>
            <section class="wizard-card">
              <h2>首启说明</h2>
              <ul class="wizard-notes">
                <li>${escapeHtml(wizard.tokenSummary)}</li>
                <li>监听地址固定为 127.0.0.1；如果 2260 已被占用，可以先改成其他未被占用的端口。</li>
                <li>启动完成后，建议优先通过桌面会话进入 Resin WebUI，这样无需手动输入 Admin Token。</li>
              </ul>
            </section>
          </div>
          <p class="danger" id="wizardPortError" hidden></p>
          <div class="actions">
            <button class="primary" id="continueBtn">${escapeHtml(wizard.confirmActionLabel)}</button>
          </div>
        `;

        document.getElementById("continueBtn").addEventListener("click", async (event) => {
          if (!getBridge()?.ContinueFirstRun) {
            return;
          }
          const portError = document.getElementById("wizardPortError");
          const launchPort = parseLaunchPort(document.getElementById("wizardPortInput")?.value);
          if (!launchPort.ok) {
            portError.hidden = false;
            portError.textContent = launchPort.message;
            return;
          }
          portError.hidden = true;
          event.currentTarget.disabled = true;
          beginFirstRunStartup({
            ...viewModel,
            wizard: {
              ...wizard,
              port: launchPort.value,
            },
          }, launchPort.value);
        });
      }

      function renderStarting(viewModel) {
        const wizard = viewModel.wizard ?? {
          portableRootDir: "正在读取便携目录…",
          listenAddress: "127.0.0.1",
          port: 2260,
          tokenSummary: "桌面壳正在等待 Resin Core 完成健康检查。首次启动可能需要数秒。",
          confirmActionLabel: "立即启动 Core"
        };

        appRoot.innerHTML = `
          <div class="status-pill">启动中</div>
          <h1>正在启动 Resin Core</h1>
          <p>桌面壳已写入首启确认，正在等待本地 Core 就绪。请保持当前窗口打开，不需要手动刷新。</p>
          <dl>
            <dt>便携目录</dt>
            <dd class="code">${escapeHtml(wizard.portableRootDir)}</dd>
            <dt>监听地址</dt>
            <dd>${escapeHtml(wizard.listenAddress)}</dd>
            <dt>监听端口</dt>
            <dd>${escapeHtml(String(wizard.port))}</dd>
            <dt>当前状态</dt>
            <dd>${escapeHtml(viewModel.state || "starting-core")}</dd>
          </dl>
          <p class="muted">${escapeHtml(wizard.tokenSummary)}</p>
          <div class="actions">
            <button class="primary" disabled>正在启动…</button>
          </div>
        `;
      }

      function renderDiagnostics(viewModel) {
        const diagnostics = viewModel.diagnostics;
        const occupant = diagnostics.portOccupant
          ? `
              <dt>占用进程</dt>
              <dd>${escapeHtml(diagnostics.portOccupant.imageName || "未知进程")} (PID ${escapeHtml(String(diagnostics.portOccupant.pid))})</dd>
              <dt>进程路径</dt>
              <dd class="code">${escapeHtml(diagnostics.portOccupant.executablePath || "未能解析")}</dd>
            `
          : "";
        appRoot.innerHTML = `
          <div class="status-pill">启动诊断</div>
          <h1>桌面壳未能完成启动</h1>
          <p class="danger">错误码：<strong>${escapeHtml(diagnostics.code)}</strong></p>
          <p>${escapeHtml(diagnostics.summary)}</p>
          <dl>
            <dt>便携目录</dt>
            <dd class="code">${escapeHtml(diagnostics.rootDir)}</dd>
            <dt>监听地址</dt>
            <dd>${escapeHtml(diagnostics.listenAddress || "127.0.0.1")}</dd>
            <dt>监听端口</dt>
            <dd>
              <input id="diagnosticsPortInput" type="number" min="1" max="65535" value="${escapeHtml(String(diagnostics.port || 2260))}" ${diagnostics.portEditable ? "" : "disabled"}>
            </dd>
            <dt>日志目录</dt>
            <dd class="code">${escapeHtml(diagnostics.logDir)}</dd>
            <dt>固定 Runtime</dt>
            <dd class="code">${escapeHtml(diagnostics.fixedRuntimePath)}</dd>
            <dt>健康检查</dt>
            <dd>${escapeHtml(diagnostics.healthUrl || "http://127.0.0.1:2260/healthz")}</dd>
            ${occupant}
          </dl>
          <pre>${escapeHtml(diagnostics.details || "未返回额外细节。")}</pre>
          <p class="muted">监听地址固定为 127.0.0.1；如果端口冲突，可以修改端口后重试启动。</p>
          <p class="danger" id="diagnosticsPortError" hidden></p>
          <div class="actions">
            <button class="secondary" id="openLogBtn">${escapeHtml(diagnostics.openLogActionLabel)}</button>
            <button class="primary" id="retryBtn">${escapeHtml(diagnostics.retryActionLabel)}</button>
            <button class="secondary" id="copyBtn">${escapeHtml(diagnostics.copyActionLabel)}</button>
          </div>
          <p class="muted">复制出的诊断文本只包含固定路径、监听地址与错误码，不包含 raw token。</p>
        `;

        document.getElementById("openLogBtn").addEventListener("click", async () => {
          await getBridge()?.OpenLogDirectory?.();
        });

        document.getElementById("retryBtn").addEventListener("click", async (event) => {
          const bridge = getBridge();
          if (!bridge?.RetryStartup || !bridge?.SetLaunchPort) {
            return;
          }
          const portError = document.getElementById("diagnosticsPortError");
          const launchPort = parseLaunchPort(document.getElementById("diagnosticsPortInput")?.value);
          if (!launchPort.ok) {
            portError.hidden = false;
            portError.textContent = launchPort.message;
            return;
          }
          portError.hidden = true;
          event.currentTarget.disabled = true;
          try {
            await bridge.SetLaunchPort(launchPort.value);
            await bridge.RetryStartup();
          } finally {
            await refresh();
          }
        });

        document.getElementById("copyBtn").addEventListener("click", async () => {
          const bridge = getBridge();
          const text = bridge?.CopyDiagnostics ? await bridge.CopyDiagnostics() : diagnostics.copyText;
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(text);
          }
        });
      }

      function renderErrorState(viewModel) {
        appRoot.innerHTML = `
          <div class="status-pill">错误</div>
          <h1>桌面壳进入异常状态</h1>
          <p class="danger">当前状态：<strong>${escapeHtml(viewModel.state || "error")}</strong></p>
          <p>桌面壳没有成功进入首启引导、诊断页或业务界面，因此不应继续自动跳转到 Resin WebUI。请先查看日志，再决定是否重试启动。</p>
          <div class="actions">
            <button class="secondary" id="errorOpenLogBtn">打开日志目录</button>
            <button class="primary" id="errorRefreshBtn">重新检查状态</button>
          </div>
        `;

        document.getElementById("errorOpenLogBtn").addEventListener("click", async () => {
          await getBridge()?.OpenLogDirectory?.();
        });

        document.getElementById("errorRefreshBtn").addEventListener("click", async () => {
          await refresh();
        });
      }

      function renderDesktopAccessHub(accessView) {
        const webUiBase = ensureTrailingSlash(accessView?.webUiUrl || "http://127.0.0.1:2260/ui/");
        const desktopEntryRoute = "/ui/";
        const desktopHelpRoute = `${desktopEntryRoute}desktop/help`;
        const diagnosticsText = [
          `桌面模式：${accessView?.desktopMode ? "是" : "否"}`,
          `会话策略：${accessView?.sessionMode || "memory-only"}`,
          `监听地址：${accessView?.listenAddress || "127.0.0.1"}`,
          `监听端口：${String(accessView?.port || 2260)}`,
          `健康检查：${accessView?.healthUrl || ""}`,
          `日志目录：${accessView?.logDir || ""}`,
          `状态目录：${accessView?.stateDir || ""}`,
          `缓存目录：${accessView?.cacheDir || ""}`,
          `桌面目录：${accessView?.desktopDir || ""}`,
          `固定 Runtime：${accessView?.fixedRuntimePath || ""}`,
          `认证版本：${accessView?.authVersion || "V1"}`,
          `管理端鉴权：${accessView?.adminTokenSet ? "已设置" : "未设置"}`,
          `代理端鉴权：${accessView?.proxyTokenSet ? "已设置" : "未设置"}`,
        ].join("\n");

        appRoot.innerHTML = `
          <div class="status-pill">桌面入口</div>
          <div class="hero-banner">
            <div class="hero-badge-mark" aria-hidden="true"></div>
            <div class="hero-copy">
              <h1>本地接入与诊断入口</h1>
              <p>这里专门提供桌面壳拥有的本地接入信息、认证说明、诊断与目录动作；通过桌面会话进入 Resin WebUI 时，不需要手动输入 Admin Token。</p>
            </div>
          </div>
          <div class="hub-grid">
            <section class="hub-card">
              <h2>本机接入总览</h2>
              <div class="hub-inline-list">
                <div class="hub-inline-item">
                  <span>浏览器直连地址</span>
                  <strong class="code">${escapeHtml(webUiBase)}</strong>
                </div>
                <div class="hub-inline-item">
                  <span>健康检查</span>
                  <strong class="code">${escapeHtml(accessView?.healthUrl || "")}</strong>
                </div>
                <div class="hub-inline-item">
                  <span>正向代理入口</span>
                  <strong class="code">${escapeHtml(accessView?.forwardProxyUrl || "")}</strong>
                </div>
              </div>
              <p class="muted">如果你从这里点击“打开 Resin WebUI（桌面会话）”，桌面壳会自动注入当前会话所需的管理端凭据；只有直接在浏览器访问上面的直连地址时，才需要手动输入当前 Admin Token。</p>
              <div class="hub-copy-actions">
                <button class="secondary" id="copyWebUiBtn">复制 WebUI 地址</button>
                <button class="secondary" id="copyHealthBtn">复制健康检查地址</button>
                <button class="secondary" id="copyProxyBtn">复制代理地址</button>
              </div>
              <div class="hub-actions-column">
                <button class="primary" id="openWebUiBtn">${escapeHtml(accessView?.openWebUiLabel || "打开 Resin WebUI")}</button>
                <button class="secondary" id="openDesktopHelpBtn">打开桌面使用指南</button>
              </div>
            </section>

            <section class="hub-card">
              <h2>认证与协议说明</h2>
              <div class="hub-inline-list">
                <div class="hub-inline-item">
                  <span>认证版本</span>
                  <strong>${escapeHtml(accessView?.authVersion || "V1")}</strong>
                </div>
                <div class="hub-inline-item">
                  <span>管理端 Token</span>
                  <strong>${accessView?.adminTokenSet ? "已设置（仅控制面使用）" : "未设置"}</strong>
                </div>
                <div class="hub-inline-item">
                  <span>代理端 Token</span>
                  <strong>${accessView?.proxyTokenSet ? "已设置（外部客户端接入使用）" : "未设置"}</strong>
                </div>
                <div class="hub-inline-item">
                  <span>客户端 API 密钥（Proxy Token）</span>
                  <strong id="proxyTokenPreview">默认隐藏（点击下方按钮后仅在当前窗口显示）</strong>
                </div>
              </div>
              <p class="muted">当前入口只说明 Token 的作用边界，不默认展示 raw admin/proxy token，也不会把它们写入 URL、浏览器持久化存储或普通日志。</p>
              <div class="hub-copy-actions">
                <button class="secondary" id="copyProxyTokenBtn">显示并复制 Proxy Token</button>
              </div>
            </section>

            <section class="hub-card">
              <h2>为什么这里不再承载完整教程</h2>
              <p>首启页和桌面壳入口面只负责一次性初始化、启动恢复和最小本地动作；会重复查看的接入说明、代理示例、代理池验证方法与常见问题，已经迁到 WebUI 里的“桌面使用指南”。</p>
              <div class="hub-actions-column">
                <button class="secondary" id="openDesktopHelpSecondaryBtn">去桌面使用指南查看完整说明</button>
              </div>
            </section>

            <section class="hub-card">
              <h2>目录与诊断动作</h2>
              <div class="hub-inline-list">
                <div class="hub-inline-item"><span>日志目录</span><strong class="code">${escapeHtml(accessView?.logDir || "")}</strong></div>
                <div class="hub-inline-item"><span>状态目录</span><strong class="code">${escapeHtml(accessView?.stateDir || "")}</strong></div>
                <div class="hub-inline-item"><span>缓存目录</span><strong class="code">${escapeHtml(accessView?.cacheDir || "")}</strong></div>
                <div class="hub-inline-item"><span>桌面目录</span><strong class="code">${escapeHtml(accessView?.desktopDir || "")}</strong></div>
              </div>
              <div class="hub-actions-column">
                <button class="secondary" id="openLogsBtn">${escapeHtml(accessView?.openLogsLabel || "打开日志目录")}</button>
                <button class="secondary" id="copyDesktopDiagBtn">${escapeHtml(accessView?.copyDiagnosticsLabel || "复制诊断信息")}</button>
                <button class="secondary" id="recheckDesktopBtn">重新检查状态</button>
              </div>
            </section>
          </div>
          <div class="hub-grid hub-grid-single-row">
            <section class="hub-card">
              <h2>复制出的最小桌面诊断</h2>
              <pre>${escapeHtml(diagnosticsText)}</pre>
              <p class="muted">这段文本只包含本机接入地址、目录、认证姿态和固定路径，不包含 raw token。</p>
            </section>
          </div>
        `;

        bindCopyButton("copyWebUiBtn", webUiBase);
        bindCopyButton("copyHealthBtn", accessView?.healthUrl || "");
        bindCopyButton("copyProxyBtn", accessView?.forwardProxyUrl || "");
        document.getElementById("copyProxyTokenBtn")?.addEventListener("click", async () => {
          const bridge = getBridge();
          if (!bridge?.ProxyAccessToken) {
            alert("当前桌面会话未就绪，暂时无法读取 Proxy Token。请稍后重试。");
            return;
          }
          const token = String(await bridge.ProxyAccessToken() || "").trim();
          if (!token) {
            alert("当前会话没有可用的 Proxy Token。请先完成首启并重试。");
            return;
          }
          const preview = document.getElementById("proxyTokenPreview");
          if (preview) {
            preview.textContent = token;
          }
          await copyText(token);
        });

        document.getElementById("openWebUiBtn")?.addEventListener("click", () => {
          window.location.replace(desktopEntryRoute);
        });
        document.getElementById("openDesktopHelpBtn")?.addEventListener("click", () => {
          window.location.replace(desktopHelpRoute);
        });
        document.getElementById("openDesktopHelpSecondaryBtn")?.addEventListener("click", () => {
          window.location.replace(desktopHelpRoute);
        });
        document.getElementById("openLogsBtn")?.addEventListener("click", async () => {
          await getBridge()?.OpenLogDirectory?.();
        });
        document.getElementById("copyDesktopDiagBtn")?.addEventListener("click", async () => {
          const bridge = getBridge();
          const text = bridge?.CopyDiagnostics ? await bridge.CopyDiagnostics() : diagnosticsText;
          await copyText(text || diagnosticsText);
        });
        document.getElementById("recheckDesktopBtn")?.addEventListener("click", async () => {
          await refresh();
        });
      }

      async function renderFallback() {
        const accessView = await getDesktopAccessView();
        renderDesktopAccessHub(accessView);
      }

      function stopStartupPolling() {
        if (startupPollingTimer === null) {
          return;
        }
        window.clearInterval(startupPollingTimer);
        startupPollingTimer = null;
      }

      function startStartupPolling() {
        if (startupPollingTimer !== null) {
          return;
        }
        startupPollingTimer = window.setInterval(() => {
          void refreshDuringStartup();
        }, startupPollIntervalMs);
      }

      async function refreshDuringStartup() {
        if (startupPollingInFlight) {
          return;
        }
        startupPollingInFlight = true;
        try {
          const viewModel = await getViewModel();
          if (!viewModel) {
            renderBridgePending();
            return;
          }
          if (viewModel.state === "diagnostics" && viewModel.diagnostics) {
            firstRunStarting = false;
            stopStartupPolling();
            renderDiagnostics(viewModel);
            return;
          }
          if (viewModel.state === "error") {
            firstRunStarting = false;
            stopStartupPolling();
            renderErrorState(viewModel);
            return;
          }
          if (firstRunStarting && viewModel.state === "wizard" && viewModel.wizard) {
            renderStarting(viewModel);
            return;
          }
          if (viewModel.state === "starting-core") {
            renderStarting(viewModel);
            return;
          }
          firstRunStarting = false;
          stopStartupPolling();
          await refresh();
        } finally {
          startupPollingInFlight = false;
        }
      }

      function waitForNextFrame() {
        return new Promise((resolve) => {
          window.requestAnimationFrame(() => resolve());
        });
      }

      function beginFirstRunStartup(viewModel, launchPort) {
        const bridge = getBridge();
        if (!bridge?.ContinueFirstRun || !bridge?.SetLaunchPort || firstRunStarting) {
          return;
        }
        firstRunStarting = true;
        renderStarting(viewModel);
        startStartupPolling();
        void waitForNextFrame().then(async () => {
          try {
            await bridge.SetLaunchPort(launchPort);
            await bridge.ContinueFirstRun();
          } finally {
            firstRunStarting = false;
            stopStartupPolling();
            await refresh();
          }
        });
      }

      async function refresh() {
        const viewModel = await getViewModel();
        if (!viewModel) {
          stopStartupPolling();
          renderBridgePending();
          scheduleBridgeRefresh();
          return;
        }
        if (firstRunStarting) {
          startStartupPolling();
          renderStarting(viewModel);
          return;
        }
        if (viewModel.state === "wizard" && viewModel.wizard) {
          stopStartupPolling();
          renderWizard(viewModel);
          return;
        }
        if (viewModel.state === "starting-core") {
          startStartupPolling();
          renderStarting(viewModel);
          return;
        }
        if (viewModel.state === "diagnostics" && viewModel.diagnostics) {
          firstRunStarting = false;
          stopStartupPolling();
          renderDiagnostics(viewModel);
          return;
        }
        if (viewModel.state === "error") {
          firstRunStarting = false;
          stopStartupPolling();
          renderErrorState(viewModel);
          return;
        }
        firstRunStarting = false;
        stopStartupPolling();
        await renderFallback(viewModel);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function parseLaunchPort(rawValue) {
        const value = Number.parseInt(String(rawValue ?? "").trim(), 10);
        if (!Number.isInteger(value) || value < 1 || value > 65535) {
          return { ok: false, message: "请输入 1 到 65535 之间的端口号。" };
        }
        return { ok: true, value };
      }

      function ensureTrailingSlash(value) {
        return String(value || "").endsWith("/") ? String(value || "") : `${String(value || "")}/`;
      }

      async function copyText(value) {
        if (!value) {
          return;
        }
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(value);
          return;
        }
        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
      }

      function bindCopyButton(id, value) {
        document.getElementById(id)?.addEventListener("click", async () => {
          await copyText(value);
        });
      }

      refresh();
    </script>
  </body>
</html>
