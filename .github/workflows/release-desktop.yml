name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 v* tag，例如 v1.2.3 或 v1.2.3-rc.1'
        required: true
        type: string

concurrency:
  group: release-desktop-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.25.x'
  NODE_VERSION: '22'
  RELEASE_ASSET_FULL_NAME: 'resinat-windows-amd64-portable.zip'
  RELEASE_ASSET_LITE_NAME: 'resinat-windows-amd64-portable-lite.zip'

jobs:
  release-desktop:
    name: Build Portable Desktop Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Resolve Release Metadata
        id: release_meta
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
              '${{ inputs.tag }}'
          }
          else {
              '${{ github.ref_name }}'
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
              throw 'A release tag is required.'
          }
          if (-not $tag.StartsWith('v')) {
              throw "Release tag must start with v: $tag"
          }

          $isPrerelease = if ($tag.Contains('-')) { 'true' } else { 'false' }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ref=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "is_prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_meta.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build portable packages
        shell: pwsh
        run: ./scripts/build-portable.ps1 -Version '${{ steps.release_meta.outputs.tag }}'

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-desktop
          path: |
            dist/${{ env.RELEASE_ASSET_FULL_NAME }}
            dist/${{ env.RELEASE_ASSET_LITE_NAME }}
          retention-days: 1

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          files: |
            dist/${{ env.RELEASE_ASSET_FULL_NAME }}
            dist/${{ env.RELEASE_ASSET_LITE_NAME }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.release_meta.outputs.is_prerelease == 'true' }}
