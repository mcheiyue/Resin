name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 v* tag，例如 v1.2.3 或 v1.2.3-rc.1'
        required: true
        type: string
      build_ref:
        description: '用于构建桌面包的源码 ref；为空时默认使用触发工作流的当前分支，可用于给旧 tag 补发桌面版'
        required: false
        type: string

concurrency:
  group: release-desktop-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.25.x'
  NODE_VERSION: '22'
  RELEASE_ASSET_FULL_NAME: 'resinat-windows-amd64-portable.zip'
  RELEASE_ASSET_LITE_NAME: 'resinat-windows-amd64-portable-lite.zip'
  RELEASE_MANIFEST_NAME: 'portable-build-manifest.json'

jobs:
  release-desktop:
    name: Build Portable Desktop Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Resolve Release Metadata
        id: release_meta
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
              '${{ inputs.tag }}'
          }
          else {
              '${{ github.ref_name }}'
          }

          $buildRef = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
              if ([string]::IsNullOrWhiteSpace('${{ inputs.build_ref }}')) {
                  '${{ github.ref_name }}'
              }
              else {
                  '${{ inputs.build_ref }}'
              }
          }
          else {
              '${{ github.ref_name }}'
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
              throw 'A release tag is required.'
          }
          if (-not $tag.StartsWith('v')) {
              throw "Release tag must start with v: $tag"
          }
          if ([string]::IsNullOrWhiteSpace($buildRef)) {
              throw 'A build ref is required.'
          }

          $isPrerelease = if ($tag.Contains('-')) { 'true' } else { 'false' }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ref=$buildRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "is_prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_meta.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build portable packages
        shell: pwsh
        run: ./scripts/build-portable.ps1 -Version '${{ steps.release_meta.outputs.tag }}' -ManifestPath 'dist/${{ env.RELEASE_MANIFEST_NAME }}'

      - name: Smoke test full portable package
        shell: pwsh
        run: |
          $summaryLines = @()
          $scenarios = @(
            'first-launch'
            'explicit-exit'
            'second-instance'
            'port-collision'
            'invalid-config'
          )

          foreach ($scenario in $scenarios) {
            ./scripts/smoke-portable.ps1 -Scenario $scenario -ZipPath 'dist/${{ env.RELEASE_ASSET_FULL_NAME }}' -PackageVariant Full
            $summaryLines += "- full/$scenario ✅"
          }

          "## Desktop smoke summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          $summaryLines | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Validate lite portable package structure
        shell: pwsh
        run: |
          ./scripts/smoke-portable.ps1 -Scenario zip-structure -ZipPath 'dist/${{ env.RELEASE_ASSET_LITE_NAME }}' -PackageVariant Lite
          "- lite/zip-structure ✅" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Summarize desktop release assets
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $manifestPath = Join-Path $PWD 'dist/${{ env.RELEASE_MANIFEST_NAME }}'
          if (-not (Test-Path $manifestPath)) {
            throw "Build manifest not found: $manifestPath"
          }

          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "## Desktop package manifest" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "- version: $($manifest.version)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "- gitCommit: $($manifest.gitCommit)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "- packageVariant: $($manifest.packageVariant)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          foreach ($package in $manifest.packages) {
            "- $($package.id): $($package.assetName) (fixedRuntime=$($package.includeFixedRuntime))" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-desktop
          path: |
            dist/${{ env.RELEASE_ASSET_FULL_NAME }}
            dist/${{ env.RELEASE_ASSET_LITE_NAME }}
            dist/${{ env.RELEASE_MANIFEST_NAME }}
          retention-days: 1

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.tag }}
          files: |
            dist/${{ env.RELEASE_ASSET_FULL_NAME }}
            dist/${{ env.RELEASE_ASSET_LITE_NAME }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.release_meta.outputs.is_prerelease == 'true' }}
