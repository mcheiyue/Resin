name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 v* tag，例如 v1.2.3 或 v1.2.3-rc.1'
        required: true
        type: string

concurrency:
  group: release-desktop-${{ github.event_name }}-${{ github.ref_name }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.25.x'
  NODE_VERSION: '22'
  RELEASE_ASSET_NAME: 'resinat-windows-amd64-portable.zip'

jobs:
  release-desktop:
    name: Build Portable Desktop Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Resolve Release Metadata
        id: release_meta
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
              '${{ inputs.tag }}'
          }
          else {
              '${{ github.ref_name }}'
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
              throw 'A release tag is required.'
          }
          if (-not $tag.StartsWith('v')) {
              throw "Release tag must start with v: $tag"
          }

          $isPrerelease = if ($tag.Contains('-')) { 'true' } else { 'false' }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ref=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "is_prerelease=$isPrerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_meta.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build WebUI
        shell: pwsh
        run: |
          npm --prefix webui ci
          npm --prefix webui run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build resin-core.exe
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'

          $version = '${{ steps.release_meta.outputs.tag }}'
          $gitCommit = '${{ github.sha }}'.Substring(0, 8)
          $buildTime = [DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ')
          $ldflags = "-s -w -X github.com/Resinat/Resin/internal/buildinfo.Version=$version -X github.com/Resinat/Resin/internal/buildinfo.GitCommit=$gitCommit -X github.com/Resinat/Resin/internal/buildinfo.BuildTime=$buildTime"

          New-Item -ItemType Directory -Path build -Force | Out-Null
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          $env:CGO_ENABLED = '0'
          go build -trimpath -tags "with_quic with_wireguard with_grpc with_utls with_embedded_tor with_naive_outbound" -ldflags $ldflags -o build/resin-core.exe ./cmd/resin

      - name: Build portable package
        shell: pwsh
        run: ./scripts/build-portable.ps1 -Version '${{ steps.release_meta.outputs.tag }}'

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-desktop
          path: dist/${{ env.RELEASE_ASSET_NAME }}
          retention-days: 1

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ steps.release_meta.outputs.ref }}
          name: ${{ steps.release_meta.outputs.tag }}
          files: dist/${{ env.RELEASE_ASSET_NAME }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: true
          prerelease: ${{ steps.release_meta.outputs.is_prerelease == 'true' }}
